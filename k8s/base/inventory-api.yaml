# inventory-api Deployment + Service.
#
# 2 replicas for basic redundancy; resource requests/limits set so the
# scheduler knows what to plan around. Liveness and readiness probes hit
# the /healthz endpoint (ASP.NET-style HTTP probe — distroless has no
# shell, so exec-based probes won't work).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: inventory-api
    app.kubernetes.io/part-of: otel-playground
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-api
        app.kubernetes.io/part-of: otel-playground
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: inventory-api
          image: madhanotelregistry.azurecr.io/inventory-api:6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: OTEL_SERVICE_NAME
              value: inventory-api
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: DEPLOYMENT_ENVIRONMENT
              value: dev
            - name: OTEL_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "$(OTEL_NODE_IP):4317"
            # Additional: gRPC OTLP requires explicit insecure for non-TLS;
            # HTTP OTLP doesn't use these. Setting both is fine.
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            # OTLP endpoint left at default localhost:4317 — exports fail
            # gracefully until we deploy the Collector agent in Session 2.
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: inventory-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inventory-api
  ports:
    - name: http
      port: 8081
      targetPort: http
