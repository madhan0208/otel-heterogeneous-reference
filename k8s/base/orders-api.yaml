# orders-api Deployment + Service.
#
# NodePort service so we can curl from the host on localhost:30080
# (kind config extraPortMappings forwards that to the container).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: orders-api
    app.kubernetes.io/part-of: otel-playground
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-api
        app.kubernetes.io/part-of: otel-playground
    spec:
      containers:
        - name: orders-api
          image: orders-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: orders-api
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: DEPLOYMENT_ENVIRONMENT
              value: dev
            # Cross-service URL — uses Kubernetes DNS.
            # Format: <service-name>.<namespace>.svc.cluster.local
            - name: INVENTORY_API_URL
              value: http://inventory-api.commerce.svc.cluster.local:8081
            - name: ASPNETCORE_URLS
              value: http://+:8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: commerce
  labels:
    app.kubernetes.io/name: orders-api
spec:
  # NodePort so we can curl from the host without port-forward
  type: NodePort
  selector:
    app.kubernetes.io/name: orders-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080